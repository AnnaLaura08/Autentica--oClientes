<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Login</h1>
    <p>Faça login para acessar o cadastro de clientes.</p>
  </header>

  <main>
    <section class="panel login-panel">
      <h2>Autenticação</h2>
      
      <form id="loginForm">
        <div class="form-grid">
          
          <div class="form-row">
            <label for="loginEmail">E-mail</label>
            <input type="email" id="loginEmail" name="email" required placeholder="seu.email@exemplo.com">
          </div>
          
          <div class="form-row">
            <label for="loginSenha">Senha</label>
            <input type="password" id="loginSenha" name="password" required placeholder="********">
          </div>

          <div class="form-actions">
            <button type="submit" id="btnEntrar">Entrar</button>
          </div>

        </div>
      </form>
      <div id="loginMessage" class="message" style="text-align: center; margin-top: 15px; color: #db2777; font-weight: 600;"></div>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
